<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHOOP Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 2rem; color: #00f19f; letter-spacing: -0.5px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
    .card { background: #1a1a1a; border-radius: 12px; padding: 1.4rem; border: 1px solid #2a2a2a; }
    .card-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 0.5rem; }
    .card-value { font-size: 2.2rem; font-weight: 700; color: #fff; }
    .card-value.green { color: #00f19f; }
    .card-value.yellow { color: #f5a623; }
    .card-value.red { color: #ff4d4d; }
    .card-sub { font-size: 0.8rem; color: #666; margin-top: 0.3rem; }
    .section-title { font-size: 1rem; font-weight: 600; color: #aaa; margin: 1.5rem 0 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .loading { color: #555; font-size: 0.9rem; }
    .error { color: #ff4d4d; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>⚡ WHOOP Dashboard</h1>

  <div class="section-title">Recovery</div>
  <div class="grid" id="recovery-grid">
    <div class="card"><div class="card-label">Recovery Score</div><div class="card-value loading" id="recovery-score">Loading…</div></div>
    <div class="card"><div class="card-label">HRV</div><div class="card-value" id="hrv">—</div><div class="card-sub">ms</div></div>
    <div class="card"><div class="card-label">Resting HR</div><div class="card-value" id="rhr">—</div><div class="card-sub">bpm</div></div>
    <div class="card"><div class="card-label">SpO2</div><div class="card-value" id="spo2">—</div><div class="card-sub">%</div></div>
  </div>

  <div class="section-title">Sleep</div>
  <div class="grid">
    <div class="card"><div class="card-label">Sleep Score</div><div class="card-value" id="sleep-score">—</div></div>
    <div class="card"><div class="card-label">Total Sleep</div><div class="card-value" id="sleep-total">—</div><div class="card-sub">hours</div></div>
    <div class="card"><div class="card-label">REM</div><div class="card-value" id="sleep-rem">—</div><div class="card-sub">hours</div></div>
    <div class="card"><div class="card-label">Deep (SWS)</div><div class="card-value" id="sleep-sws">—</div><div class="card-sub">hours</div></div>
  </div>

  <div class="section-title">Strain</div>
  <div class="grid">
    <div class="card"><div class="card-label">Day Strain</div><div class="card-value" id="strain">—</div><div class="card-sub">/ 21</div></div>
    <div class="card"><div class="card-label">Avg HR</div><div class="card-value" id="avg-hr">—</div><div class="card-sub">bpm</div></div>
    <div class="card"><div class="card-label">Max HR</div><div class="card-value" id="max-hr">—</div><div class="card-sub">bpm</div></div>
    <div class="card"><div class="card-label">Calories</div><div class="card-value" id="calories">—</div><div class="card-sub">kcal</div></div>
  </div>

  <script>
    const api = path => fetch('/api' + path).then(r => r.json());

    function scoreColor(score) {
      if (score >= 67) return 'green';
      if (score >= 34) return 'yellow';
      return 'red';
    }

    function msToHours(ms) {
      return (ms / 3600000).toFixed(1);
    }

    async function load() {
      try {
        // Recovery
        const rec = await api('/recovery?limit=1');
        const r = rec.records?.[0];
        if (r) {
          const score = Math.round(r.score?.recovery_score ?? 0);
          const el = document.getElementById('recovery-score');
          el.textContent = score + '%';
          el.className = 'card-value ' + scoreColor(score);
          document.getElementById('hrv').textContent = r.score?.hrv_rmssd_milli?.toFixed(1) ?? '—';
          document.getElementById('rhr').textContent = Math.round(r.score?.resting_heart_rate ?? 0) || '—';
          document.getElementById('spo2').textContent = r.score?.spo2_percentage?.toFixed(1) ?? '—';
        }

        // Sleep
        const slp = await api('/sleep?limit=1');
        const s = slp.records?.[0];
        if (s) {
          const ss = Math.round(s.score?.sleep_performance_percentage ?? 0);
          const el = document.getElementById('sleep-score');
          el.textContent = ss + '%';
          el.className = 'card-value ' + scoreColor(ss);
          document.getElementById('sleep-total').textContent = msToHours(s.score?.stage_summary?.total_in_bed_time_milli ?? 0);
          document.getElementById('sleep-rem').textContent = msToHours(s.score?.stage_summary?.total_rem_sleep_time_milli ?? 0);
          document.getElementById('sleep-sws').textContent = msToHours(s.score?.stage_summary?.total_slow_wave_sleep_time_milli ?? 0);
        }

        // Cycle (strain)
        const cyc = await api('/cycle?limit=1');
        const c = cyc.records?.[0];
        if (c) {
          document.getElementById('strain').textContent = c.score?.strain?.toFixed(1) ?? '—';
          document.getElementById('avg-hr').textContent = Math.round(c.score?.average_heart_rate ?? 0) || '—';
          document.getElementById('max-hr').textContent = Math.round(c.score?.max_heart_rate ?? 0) || '—';
          document.getElementById('calories').textContent = Math.round(c.score?.kilojoule / 4.184 ?? 0) || '—';
        }
      } catch (e) {
        document.getElementById('recovery-score').textContent = 'Error';
        document.getElementById('recovery-score').className = 'card-value error';
        console.error(e);
      }
    }

    load();
  </script>
</body>
</html>
